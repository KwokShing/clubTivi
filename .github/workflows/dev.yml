# Dev release — runs on every push to main
name: Dev Release

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true

jobs:
  prepare:
    name: Compute build timestamp
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.ts.outputs.ts }}
    steps:
      - id: ts
        run: echo "ts=$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      release_tag: dev-${{ needs.prepare.outputs.ts }}
      release_name: "🚀 Dev — ${{ needs.prepare.outputs.ts }}"
      prerelease: true

  cleanup:
    name: Clean up old dev releases
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old dev releases (keep last 7)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease and (.tagName | startswith("dev-")))] | sort_by(.tagName) | reverse | .[7:][] | .tagName' \
          | while read -r tag; do
              echo "Deleting old dev release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            done
