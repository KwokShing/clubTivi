# Nightly release — runs on every push to main
name: Nightly Release

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      release_tag: nightly-${{ github.sha }}
      release_name: "🌙 Nightly — ${{ github.sha }}"
      prerelease: true

  cleanup:
    name: Clean up old nightlies
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old nightly releases (keep last 7)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-")))] | sort_by(.tagName) | reverse | .[7:][] | .tagName' \
          | while read -r tag; do
              echo "Deleting old nightly: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            done
